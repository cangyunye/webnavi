<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResourceNav - 资源导航</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">📁</span>
                    <span class="logo-text">ResourceNav</span>
                </div>
                <button class="collapse-btn" id="collapse-btn" title="折叠/展开">
                    <span class="collapse-icon">◀</span>
                </button>
            </div>
            <nav class="nav-menu" id="nav-menu">
            </nav>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h1 class="page-title" id="page-title">欢迎使用资源导航</h1>
                <div class="header-actions" id="header-actions">
                </div>
                <div class="auth-container" id="auth-container">
                </div>
            </header>
            <div class="content-body" id="content-body">
                <div class="welcome-panel">
                    <div class="welcome-icon">🌐</div>
                    <h2>资源导航系统</h2>
                    <p>请从左侧导航栏选择分类查看资源</p>
                </div>
            </div>
        </main>
    </div>

    <div id="side-panel" class="side-panel">
        <div class="side-panel-header">
            <h2 id="side-panel-title">添加</h2>
            <button class="close-btn" onclick="closeSidePanel()">×</button>
        </div>
        <div id="side-panel-body" class="side-panel-body">
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
