<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ResourceNav · 资源导航</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="logo">ResourceNav</span>
        <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="切换侧边栏">◀</button>
      </div>
      <nav class="sidebar-nav" id="sidebarNav">
      </nav>
      <div class="sidebar-footer" id="sidebarFooter">
      </div>
    </aside>

    <main class="main-content" id="mainContent">
      <header class="topbar">
        <div class="topbar-left">
          <button class="btn-icon" onclick="toggleSidebar()" aria-label="菜单" style="display:none" id="mobileMenuBtn">☰</button>
          <span class="topbar-title" id="pageTitle">首页</span>
        </div>
        <div class="topbar-right" id="topbarRight">
        </div>
      </header>

      <div class="content-area" id="contentArea">

        <div id="homeView">
          <div style="margin-bottom: 20px;">
            <h1>资源导航</h1>
            <p class="small" style="margin-top: 4px;">团队内部资源与工具统一入口</p>
          </div>

          <div class="filter-bar" style="margin-bottom:20px">
            <input class="search-input" id="globalSearch" placeholder="搜索全部资源（名称/链接/描述）…" oninput="onGlobalSearch()" style="flex:1;min-width:200px" />
            <span class="small" id="searchStatus" style="display:none">搜索中…</span>
          </div>

          <div id="searchResults" style="display:none">
            <div class="page-header"><h2 style="font-size:1.1rem">搜索结果</h2><span class="small" id="resultCount"></span></div>
            <div class="resource-grid" id="resultGrid"></div>
          </div>

          <div class="category-grid" id="categoryGrid">
          </div>

          <div style="margin-top: 32px;">
            <h2 style="margin-bottom: 12px;">常用工具</h2>
            <div class="resource-grid" id="quickTools">
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/search.js"></script>
  <script>
    initTheme();
    const PUBLIC_CATS = { 1:'学习', 4:'AI', 5:'测试', 6:'软件资源', 8:'工具' };
    function hasFullAccess() { return currentUser && (currentUser.role === 'admin' || currentUser.role === 'ops_expert'); }
    function isRestricted(id) { return !PUBLIC_CATS[id] && !hasFullAccess(); }
    function canManageCat(id, name) {
      if (!currentUser) return false;
      if (currentUser.role === 'admin') return true;
      if (currentUser.role === 'learning_mentor') return [1,4,5,6,8].includes(id);
      if (currentUser.role === 'ops_expert') return [2,3,7].includes(id);
      return false;
    }
    let categories = [];
    let currentUser = null;

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('collapsed');
    }

    function buildSidebar() {
      const nav = document.getElementById('sidebarNav');
      nav.innerHTML = '<button class="sidebar-nav-item active" data-cat="0" onclick="goHome()"><span class="icon">🏠</span><span class="label">首页</span></button>' +
        categories.map(c => {
          const restricted = isRestricted(c.id);
          return `<button class="sidebar-nav-item${restricted?' restricted':''}" data-cat="${c.id}" onclick="navigateTo(${c.id})"><span class="icon">${c.icon || '📂'}</span><span class="label">${c.name}</span></button>`;
        }).join('');

      const footer = document.getElementById('sidebarFooter');
      let fHtml = '';
      if (currentUser && currentUser.role === 'admin') {
        fHtml += '<button class="sidebar-nav-item" onclick="go(\'admin.html\')"><span class="icon">🔧</span><span class="label">管理后台</span></button>';
      }
      if (currentUser && currentUser.role !== 'guest') {
        fHtml += '<button class="sidebar-nav-item" onclick="go(\'admin.html#apikeys\')"><span class="icon">🔑</span><span class="label">API Key</span></button>';
      }
      if (currentUser && currentUser.role === 'ops_expert') {
        fHtml += '<button class="sidebar-nav-item" onclick="go(\'devops.html\')"><span class="icon">⚙️</span><span class="label">运维管理</span></button>';
      }
      footer.innerHTML = fHtml;
    }

    function navigateTo(id) {
      const cat = categories.find(c => c.id === id);
      if (!cat) return;
      if (isRestricted(id)) {
        if (!currentUser) { go('login.html'); return; }
        alert('仅管理员可访问此页面');
        return;
      }
      if ((cat.name === '数据库' || cat.name === '研发机器') && hasFullAccess()) {
        go(cat.name === '数据库' ? 'devops.html#databases' : 'devops.html#machines');
        return;
      }
      go('category.html?id=' + id);
    }

    function goHome() { go('index.html'); }

    function renderCategories() {
      const grid = document.getElementById('categoryGrid');
      grid.innerHTML = categories.map(c => {
        const restricted = isRestricted(c.id);
        return `<div class="card category-card" onclick="navigateTo(${c.id})" style="${restricted ? 'opacity:0.55' : ''}">
          <div class="cat-bg" style="background:${c.color || '#4c8bf5'}"></div>
          <div class="cat-icon">${c.icon || '📂'}</div>
          <div class="cat-name">${c.name}</div>
          <div class="cat-count">${c.count || 0} 个资源${c.name === '数据库' || c.name === '研发机器' ? ' · 运维表格' : ''}</div>
          ${restricted ? '<div style="margin-top:6px"><span class="badge badge-gray">需登录</span></div>' : ''}
        </div>`;
      }).join('');
    }

    function renderTopbar() {
      const right = document.getElementById('topbarRight');
      const themeIcon = document.documentElement.classList.contains('dark-theme') ? '☀️' : '🌙';
      if (currentUser) {
        const roleMap = { admin:'管理员', learning_mentor:'学习导师', ops_expert:'运维专家', registered:'注册用户' };
        right.innerHTML = `<button class="btn-icon theme-toggle" onclick="toggleTheme()" title="切换主题" style="font-size:1.1rem">${themeIcon}</button>
          <span class="small">${roleMap[currentUser.role] || '注册用户'}</span>
          <div class="user-avatar" title="${currentUser.username}">${currentUser.username[0].toUpperCase()}</div>
          <button class="btn btn-ghost btn-sm" onclick="logout()">退出</button>`;
      } else {
        right.innerHTML = `<button class="btn-icon theme-toggle" onclick="toggleTheme()" title="切换主题" style="font-size:1.1rem">${themeIcon}</button>
          <button class="btn btn-ghost btn-sm" onclick="location.href='login.html'">登录</button>`;
      }
    }

    let allResources = [];

    async function ensureCache() {
      let data = getCachedData();
      if (data) { allResources = data; return; }
      const catIds = [1,4,5,6,7,8];
      const results = await Promise.all(catIds.map(id =>
        apiRequest('/resources/' + id).catch(() => [])
      ));
      allResources = results.flat();
      setCachedData(allResources);
    }

    function renderQuickTools() {
      const tools = allResources.filter(r => r.category_id === 8);
      const container = document.getElementById('quickTools');
      if (tools.length === 0) { container.innerHTML = ''; return; }
      container.innerHTML = tools.map(r => `
        <a class="card resource-card" href="${r.url}" target="_blank" rel="noopener">
          <div class="rc-icon">🔗</div>
          <div class="rc-body">
            <div class="rc-title">${r.name}</div>
            <div class="rc-desc">${r.description || ''}</div>
          </div>
        </a>
      `).join('');
    }

    function countByCategory() {
      const m = {};
      allResources.forEach(r => { m[r.category_id] = (m[r.category_id] || 0) + 1; });
      return m;
    }

    let searchTimer = null;
    function onGlobalSearch() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(doSearch, 250);
    }

    function doSearch() {
      const q = document.getElementById('globalSearch').value.trim();
      const resultsDiv = document.getElementById('searchResults');
      const grid = document.getElementById('categoryGrid');
      const toolsDiv = document.getElementById('quickTools')?.parentElement;

      if (!q) {
        resultsDiv.style.display = 'none';
        grid.style.display = '';
        if (toolsDiv) toolsDiv.style.display = '';
        return;
      }

      const hits = filterByPermission(filterResources(allResources, q), currentUser);
      resultsDiv.style.display = '';
      grid.style.display = 'none';
      if (toolsDiv) toolsDiv.style.display = 'none';
      document.getElementById('resultCount').textContent = hits.length + ' 个结果';

      const CAT_NAMES = { 1:'学习',2:'数据库',3:'研发机器',4:'AI',5:'测试',6:'软件资源',7:'运维',8:'工具' };
      document.getElementById('resultGrid').innerHTML = hits.length === 0
        ? '<div class="empty-state"><p>没有找到匹配的资源</p></div>'
        : hits.map(r => `
          <a class="card resource-card" href="${r.url}" target="_blank" rel="noopener">
            <div class="rc-icon">🔗</div>
            <div class="rc-body">
              <div class="rc-title">${r.name}</div>
              <div class="rc-desc">${CAT_NAMES[r.category_id] || ''} · ${r.description || ''}</div>
            </div>
          </a>
        `).join('');
    }

    async function init() {
      currentUser = getUser();
      renderTopbar();

      try {
        categories = await apiRequest('/categories');
      } catch { categories = []; }

      const ICON_MAP = { '学习':'📚','数据库':'🗄️','研发机器':'🖥️','AI':'🤖','测试':'🧪','软件资源':'💿','运维':'⚙️','工具':'🛠️' };
      const COLOR_MAP = { '学习':'#4c8bf5','数据库':'#22c55e','研发机器':'#eab308','AI':'#a855f7','测试':'#ef4444','软件资源':'#06b6d4','运维':'#f97316','工具':'#ec4899' };

      await ensureCache();
      const countMap = countByCategory();

      categories = categories.map(c => ({
        ...c,
        icon: ICON_MAP[c.name] || '📂',
        color: COLOR_MAP[c.name] || '#4c8bf5',
        count: countMap[c.id] || 0
      }));

      buildSidebar();
      renderCategories();
      renderQuickTools();

      if (window.innerWidth <= 768) {
        document.getElementById('mobileMenuBtn').style.display = 'grid';
        document.getElementById('sidebar').classList.remove('collapsed');
      }
      window.addEventListener('resize', () => {
        const btn = document.getElementById('mobileMenuBtn');
        btn.style.display = window.innerWidth <= 768 ? 'grid' : 'none';
      });
      document.getElementById('mobileMenuBtn').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('mobile-open');
      });
    }

    init();
  </script>
</body>
</html>
